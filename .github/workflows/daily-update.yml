name: Daily Auto Commit - 24f1002465@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Daily commit by 24f1002465@ds.study.iitm.ac.in
        run: |
          echo "Daily update on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f1002465@ds.study.iitm.ac.in"
          git add .
          git commit -m "Daily automated update" || echo "No changes to commit"
          git push

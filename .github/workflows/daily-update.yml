name: Daily Auto Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Daily at 02:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Daily commit by 24f1002465@ds.study.iitm.ac.in
        run: |
          echo "Update on $(date)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f1002465@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated update $(date)"
          git push
